<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAGNAR — Listing</title>
  <link rel="icon" href="/static/logo.png" />
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    .item-wrap { max-width: 1100px; margin: 0 auto; padding: 26px clamp(16px, 4vw, 40px) 60px; }
    .item-grid { display: grid; grid-template-columns: minmax(0, 440px) minmax(0, 1fr); gap: 26px; align-items: start; }
    .item-grid[hidden] { display: none; }

    /* Left: photo */
    .item-photo { overflow: hidden; }
    .photo-box {
      aspect-ratio: 3 / 4; position: relative; display: grid; place-items: center; overflow: hidden;
      background: radial-gradient(circle at 50% 30%, rgba(183,231,244,.12), var(--color-bg-panel-strong));
    }
    .photo-box img { width: 100%; height: 100%; object-fit: contain; }
    .photo-box .placeholder-crest { width: 54%; opacity: 0.28; }
    .photo-badges { position: absolute; top: 10px; left: 10px; display: flex; gap: 6px; flex-wrap: wrap; z-index: 1; }
    .badge.featured { background: rgba(232,160,69,0.16); border-color: rgba(111,214,255,0.65); color: var(--ice); letter-spacing: 0.05em; }
    .badge.soldout { background: rgba(255,138,138,0.14); border-color: rgba(255,138,138,0.55); color: var(--danger); }

    /* Right: main */
    .sold-banner {
      padding: 10px 14px; margin-bottom: 14px; border-radius: 10px; font-weight: 700; letter-spacing: 0.06em;
      border: 1px solid rgba(255,138,138,0.5); background: rgba(255,138,138,0.1); color: var(--danger);
    }
    .item-main h1 { margin: 0 0 6px; font-size: clamp(22px, 3vw, 32px); line-height: 1.15; }
    .item-sub { color: var(--muted); font-size: 14px; margin-bottom: 14px; }
    .price-line { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
    .item-price { font-size: 34px; font-weight: 800; color: var(--text); }
    .ship-note { color: var(--text-soft); font-size: 14px; }
    .views { color: var(--muted); font-size: 13px; margin: 4px 0 16px; }
    .action-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
    .auth-note { min-height: 18px; margin-bottom: 12px; }
    .auth-note a { font-weight: 600; }

    /* Offer box */
    .offer-box { padding: 14px 16px; margin-bottom: 16px; }
    .offer-box h3 { margin: 0 0 10px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--steel); }
    .offer-row { display: grid; grid-template-columns: 140px 1fr auto; gap: 8px; }
    .offer-mine { margin-top: 10px; font-size: 13px; color: var(--text-soft); }
    .offer-mine strong { color: var(--text); }
    .offer-chip {
      display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 9px; margin-left: 6px;
      border-radius: 999px; border: 1px solid var(--border-strong); text-transform: uppercase; letter-spacing: 0.05em;
    }
    .offer-chip.open { color: var(--ice); border-color: rgba(111,214,255,0.5); background: rgba(232,160,69,0.1); }
    .offer-chip.countered { color: var(--gold); border-color: rgba(240,198,116,0.5); background: rgba(240,198,116,0.1); }
    .offer-chip.accepted { color: var(--ok); border-color: rgba(120,230,180,0.5); background: rgba(120,230,180,0.1); }
    .offer-chip.declined { color: var(--danger); border-color: rgba(255,138,138,0.5); background: rgba(255,138,138,0.08); }
    .offer-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 8px; }

    /* Seller card */
    .seller-card { padding: 14px 16px; margin-bottom: 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .seller-av {
      width: 52px; height: 52px; border-radius: 14px; display: grid; place-items: center; overflow: hidden;
      font-weight: 800; font-size: 22px; color: #fff; background: var(--steel); flex: none;
    }
    .seller-av img { width: 100%; height: 100%; object-fit: cover; }
    .seller-meta { flex: 1; min-width: 160px; }
    .seller-name { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .seller-stars { font-size: 13px; color: var(--gold); margin-top: 2px; }
    .seller-links { display: flex; gap: 8px; flex-wrap: wrap; }

    .desc-head { margin: 0 0 8px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--steel); }
    .item-desc { color: var(--text-soft); line-height: 1.55; white-space: pre-line; margin: 0 0 16px; }

    /* Sold history */
    .history-card { margin-top: 26px; padding: 16px 18px; }

    .state-card { max-width: 560px; margin: 8vh auto; padding: 30px; text-align: center; }
    .state-card h2 { margin-top: 0; }

    @media (max-width: 860px) {
      .item-grid { grid-template-columns: 1fr; }
      .offer-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .history-stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
  <link rel="stylesheet" href="/static/pages.css" />
</head>
<body>
  <div class="aurora"></div>
  <header id="siteHeader"></header>

  <main class="item-wrap">
    <div id="pageState" class="card state-card" aria-live="polite"><p class="muted">Summoning the listing…</p></div>

    <div id="itemGrid" class="item-grid" hidden>
      <div class="card item-photo">
        <div class="photo-box" id="photoBox"></div>
      </div>
      <div class="item-main" id="itemMain"></div>
    </div>

    <div id="historyWrap" hidden aria-live="polite"></div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/static/listing.js"></script>
  <script src="/static/nav.js"></script>
  <script src="/static/sell.js"></script>
</body>
</html>
