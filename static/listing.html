<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAGNAR — Listing</title>
  <link rel="icon" href="/static/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/pages.css" />
</head>
<body class="page-listing">
  <div class="aurora"></div>
  <header id="siteHeader"></header>

  <main class="item-wrap">
    <div id="pageState" class="card state-card" aria-live="polite"><p class="muted">Summoning the listing…</p></div>

    <div id="itemGrid" class="item-grid" hidden>
      <div class="card item-photo">
        <div class="photo-box" id="photoBox"></div>
      </div>
      <div class="item-main" id="itemMain"></div>
    </div>

    <div id="historyWrap" hidden aria-live="polite"></div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/static/listing.js"></script>
  <script src="/static/nav.js"></script>
  <script src="/static/sell.js"></script>
</body>
</html>
