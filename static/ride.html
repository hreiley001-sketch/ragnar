<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAGNAR — Live Ride</title>
  <link rel="icon" href="/static/logo.png" />
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    .ride-wrap { padding: 18px clamp(16px,4vw,40px) 60px; max-width: 1100px; margin: 0 auto; }
    .ride-head { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .ride-title { margin:6px 0; }
    .track { display:flex; gap:8px; margin: 16px 0 22px; }
    .stop { flex:1; text-align:center; padding:10px 6px; border-radius:10px; border:1px solid var(--border); background:var(--panel); position:relative; font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
    .stop.done { color:var(--text-soft); }
    .stop.active { border-color:var(--ice); color:var(--text); box-shadow:0 0 18px rgba(55,189,255,.35); background:rgba(37,99,235,.10); }
    .stop .cart { position:absolute; top:-14px; left:50%; transform:translateX(-50%); font-size:16px; }
    .ride-main { display:grid; grid-template-columns: 1.3fr 1fr; gap:20px; }
    .card-panel, .bid-panel, .feed-panel { padding:18px; }
    .cardimg { width:100%; aspect-ratio:3/4; max-height:420px; object-fit:contain; border-radius:12px; background:radial-gradient(circle at 50% 30%, rgba(55,189,255,.12), #e6ebf2); border:1px solid var(--border); }
    .countdown { font-size:40px; font-weight:800; color:var(--ice); text-shadow:0 0 20px rgba(55,189,255,.4); }
    .bid-now { font-size:40px; font-weight:800; color:var(--text); }
    .muted-s { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
    .title-block { margin:12px 0 4px; }
    .card-stats-row { margin-top:12px; display:flex; gap:22px; flex-wrap:wrap; }
    .market-price { font-weight:700; }
    .bidder-line { margin-bottom:14px; }
    .top-gap-card { margin-top:20px; }
    .video-wrap { padding:10px; }
    .video-head { margin-bottom:8px; }
    .video-box { aspect-ratio:16/9; border-radius:10px; overflow:hidden; background:#000; display:grid; place-items:center; color:var(--muted); font-size:13px; }
    .giveaway-wrap { padding:14px; }
    .giveaway-row { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-top:6px; }
    .giveaway-meta { font-size:13px; }
    .giveaway-winner { margin:10px 0 0; padding:12px; }
    .feed-wrap { margin-top:20px; }
    .feed-head-live { margin-left:8px; }
    .chat-row { display:grid; grid-template-columns:auto 1fr auto; gap:8px; margin-top:10px; align-items:center; }
    .chat-name { max-width:120px; }
    .feed { max-height:260px; overflow:auto; display:flex; flex-direction:column; gap:6px; margin-top:8px; }
    .feed-item { font-size:13px; padding:6px 10px; border-radius:8px; background:var(--bg-2); border:1px solid var(--border); color:var(--text-soft); }
    .feed-item b { color:var(--text); }
    .winner { text-align:center; padding:22px; border-radius:14px; border:1px solid rgba(240,198,116,.5); background:rgba(240,198,116,.1); color:var(--gold); font-size:20px; font-weight:800; margin-bottom:18px; }
    .live-tag { display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:700; color:#ff8a8a; }
    .live-tag .d { width:9px;height:9px;border-radius:50%;background:#ff5a5a;box-shadow:0 0 8px #ff5a5a;animation:pulse 1.3s infinite;} @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @media (max-width:820px){ .ride-main{ grid-template-columns:1fr; } }
    @media (max-width:640px){
      .ride-wrap { padding: 14px 12px 36px; }
      .track { overflow-x:auto; padding-bottom:4px; }
      .stop { min-width:120px; flex:none; }
      .card-panel, .bid-panel, .feed-panel { padding:14px; }
      .countdown, .bid-now { font-size:32px; }
      .chat-row { grid-template-columns: 1fr; }
      .chat-name { max-width:none; }
    }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <header id="siteHeader"></header>

  <main class="ride-wrap">
    <div class="ride-head">
      <h1 id="rideTitle" class="ride-title">Live Ride</h1>
      <span id="phaseTag" class="live-tag"><span class="d"></span> <span id="phaseName">—</span></span>
    </div>

    <div class="track" id="track"></div>

    <div id="winnerBox" class="winner" hidden></div>

    <div class="ride-main">
      <section class="card card-panel">
        <img id="cardImg" class="cardimg" alt="Card" />
        <h3 id="cardTitle" class="title-block">—</h3>
        <div id="cardSub" class="muted">—</div>
        <div class="card-stats-row">
          <div><div class="muted-s">Market est.</div><div id="marketPrice" class="market-price">—</div></div>
          <div><div class="muted-s">Time left</div><div class="countdown" id="countdown">—</div></div>
        </div>
      </section>

      <section class="card bid-panel">
        <div class="muted-s">Current bid</div>
        <div class="bid-now" id="currentBid">—</div>
        <div id="currentBidder" class="muted bidder-line">No bids yet</div>

        <div id="bidControls">
          <label class="field"><span>Your name</span><input id="bidderName" maxlength="60" placeholder="Ragnar" /></label>
          <label class="field"><span>Your bid ($) — min <span id="minBid">—</span></span><input id="bidAmount" type="number" min="0" step="1" /></label>
          <button id="bidBtn" class="btn btn-primary" type="button">Place bid</button>
          <p id="bidStatus" class="form-status"></p>
        </div>
        <p id="biddingClosed" class="muted" hidden>Bidding isn't open right now — hang tight in the lobby/showcase.</p>
      </section>
    </div>

    <div id="videoWrap" class="card top-gap-card video-wrap" hidden>
      <div class="muted-s video-head">📺 Live video</div>
      <div id="videoBox" class="video-box">Connecting…</div>
    </div>

    <div id="giveawayBox" class="card top-gap-card giveaway-wrap" hidden>
      <div class="muted-s">🎁 Giveaway</div>
      <div class="giveaway-row">
        <div><strong id="gaTitle"></strong> <span id="gaMeta" class="muted giveaway-meta"></span></div>
        <button id="gaEnter" class="btn btn-primary btn-sm" type="button">Enter giveaway</button>
      </div>
      <div id="gaWinner" class="winner giveaway-winner" hidden></div>
    </div>

    <section class="card feed-panel feed-wrap">
      <div class="muted-s">Live chat &amp; feed <span class="live-tag feed-head-live"><span class="d"></span> live</span></div>
      <div id="feed" class="feed" aria-live="polite"></div>
      <div class="chat-row">
        <input id="chatName" class="chat-name" placeholder="Name" maxlength="60" />
        <input id="chatBody" placeholder="Say something…" maxlength="300" />
        <button id="chatSend" class="btn btn-primary btn-sm" type="button">Chat</button>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/static/ride.js"></script>
  <script src="/static/nav.js"></script>
  <script src="/static/sell.js"></script>
</body>
</html>
