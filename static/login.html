<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAGNAR — Sign in</title>
  <link rel="icon" href="/static/logo.png" />
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    .auth-wrap { max-width: 420px; margin: 8vh auto; padding: 28px; }
    .auth-tabs { display:flex; gap:8px; margin-bottom:18px; }
    .auth-tab { flex:1; text-align:center; padding:9px; border-radius:10px; border:1px solid var(--border); background:rgba(255,255,255,.03); color:var(--text-soft); cursor:pointer; }
    .auth-tab.active { background:linear-gradient(180deg,#2a8fc4,#1c6fa3); color:#f2fbff; border-color:rgba(111,214,255,.6); font-weight:600; }
    .gbtn { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:11px; border-radius:10px; border:1px solid var(--border-strong); background:#fff; color:#1f1f1f; font-weight:600; cursor:pointer; text-decoration:none; }
    .divider { display:flex; align-items:center; gap:10px; color:var(--muted); font-size:12px; margin:16px 0; }
    .divider::before,.divider::after { content:""; flex:1; height:1px; background:var(--border); }
    .logo-c { text-align:center; margin-bottom:18px; }
    .logo-c img { height:64px; border-radius:12px; background:#f6f9fc; padding:8px 14px; }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <main>
    <div class="card auth-wrap">
      <div class="logo-c"><a href="/"><img src="/static/logo.png" alt="RAGNAR" /></a></div>

      <a id="googleBtn" class="gbtn" href="/api/auth/google/login">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.4 0 24 0 14.6 0 6.4 5.4 2.5 13.2l7.9 6.1C12.3 13.2 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.5 3-2.2 5.5-4.7 7.2l7.3 5.7C43.9 37.9 46.5 31.8 46.5 24.5z"/><path fill="#FBBC05" d="M10.4 28.3c-.5-1.4-.8-3-.8-4.8s.3-3.4.8-4.8l-7.9-6.1C.9 16.1 0 19.9 0 24s.9 7.9 2.5 11.4l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.4 0 11.9-2.1 15.8-5.8l-7.3-5.7c-2 1.4-4.7 2.3-8.5 2.3-6.3 0-11.7-3.7-13.6-9.3l-7.9 6.1C6.4 42.6 14.6 48 24 48z"/></svg>
        Sign in with Google
      </a>
      <p class="muted" style="font-size:12px;text-align:center;margin-top:8px;">Staff with an @ragnarips.com Google account get Command Hub access.</p>

      <div class="divider">or with email</div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-mode="login">Log in</button>
        <button class="auth-tab" data-mode="signup">Sign up</button>
      </div>

      <form id="authForm">
        <label class="field" id="nameField" hidden><span>Name</span><input name="name" maxlength="120" /></label>
        <label class="field"><span>Email</span><input name="email" type="email" required /></label>
        <label class="field"><span>Password</span><input name="password" type="password" required minlength="8" /></label>
        <button type="submit" class="btn btn-primary" style="width:100%;">Continue</button>
        <p id="authStatus" class="form-status"></p>
      </form>
      <p class="muted" style="font-size:12px;text-align:center;margin-top:10px;"><a href="/">← Back to RAGNAR</a></p>
    </div>
  </main>
  <div id="toast" class="toast"></div>
  <script src="/static/login.js"></script>
</body>
</html>
