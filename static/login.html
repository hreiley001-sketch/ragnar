<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAGNAR — Sign in</title>
  <link rel="icon" href="/static/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/asgard-shell.css" />
  <link rel="stylesheet" href="/static/pages.css" />
</head>
<body class="asgard-realm page-login">
  <header id="siteHeader"></header>
  <main>
    <div class="card auth-wrap">
      <div class="logo-c"><a href="/"><img src="/static/logo.png" alt="RAGNAR" /></a></div>

      <a id="googleBtn" class="gbtn" href="/api/auth/google/login">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.4 0 24 0 14.6 0 6.4 5.4 2.5 13.2l7.9 6.1C12.3 13.2 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.5 3-2.2 5.5-4.7 7.2l7.3 5.7C43.9 37.9 46.5 31.8 46.5 24.5z"/><path fill="#FBBC05" d="M10.4 28.3c-.5-1.4-.8-3-.8-4.8s.3-3.4.8-4.8l-7.9-6.1C.9 16.1 0 19.9 0 24s.9 7.9 2.5 11.4l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.4 0 11.9-2.1 15.8-5.8l-7.3-5.7c-2 1.4-4.7 2.3-8.5 2.3-6.3 0-11.7-3.7-13.6-9.3l-7.9 6.1C6.4 42.6 14.6 48 24 48z"/></svg>
        Sign in with Google
      </a>
      <p class="muted staff-note">Staff with an @ragnarips.com Google account get Command Hub access.</p>

      <div class="divider">or with email</div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-mode="login">Log in</button>
        <button class="auth-tab" data-mode="signup">Sign up</button>
      </div>

      <form id="authForm">
        <label class="field" id="nameField" hidden><span>Name</span><input name="name" maxlength="120" placeholder="Your name" /></label>
        <label class="field"><span>Email</span><input name="email" type="email" required placeholder="you@example.com" /></label>
        <label class="field"><span>Password</span><input name="password" id="pw" type="password" required minlength="8" placeholder="At least 8 characters" /></label>
        <div id="pwMeter" class="pw-meter" hidden><div id="pwBar" class="pw-bar"></div></div>
        <label class="field" id="confirmField" hidden><span>Confirm password</span><input name="confirm" type="password" placeholder="Re-enter password" /></label>
        <label class="check-row" id="termsRow" hidden style="margin-bottom:10px;"><input type="checkbox" id="terms" /> <span style="font-size:13px;">I agree to RAGNAR's Terms &amp; buyer/seller conduct.</span></label>
        <label class="check-row" id="mktRow" hidden style="margin-bottom:12px;"><input type="checkbox" id="mkt" /> <span style="font-size:13px;color:var(--muted);">Email me drop alerts &amp; news (optional).</span></label>
        <button type="submit" class="btn btn-primary" style="width:100%;">Continue</button>
        <p id="forgotWrap" style="margin:10px 0 0;text-align:center;">
          <button type="button" id="forgotLink" class="btn btn-ghost btn-sm">Forgot password?</button>
        </p>
        <p id="authStatus" class="form-status"></p>
      </form>

      <form id="forgotForm" hidden>
        <p class="muted" style="font-size:14px;margin:0 0 14px;">Enter your account email and we’ll send a reset link if it exists.</p>
        <label class="field"><span>Email</span><input name="email" type="email" required placeholder="you@example.com" /></label>
        <button type="submit" class="btn btn-primary" style="width:100%;">Send reset link</button>
        <p style="margin:10px 0 0;text-align:center;"><button type="button" id="forgotBack" class="btn btn-ghost btn-sm">← Back to log in</button></p>
        <p id="forgotStatus" class="form-status"></p>
      </form>

      <form id="resetForm" hidden>
        <p class="muted" style="font-size:14px;margin:0 0 14px;">Choose a new password for your account.</p>
        <label class="field"><span>New password</span><input name="password" type="password" required minlength="8" placeholder="At least 8 characters" /></label>
        <label class="field"><span>Confirm password</span><input name="confirm" type="password" required minlength="8" placeholder="Re-enter password" /></label>
        <button type="submit" class="btn btn-primary" style="width:100%;">Update password</button>
        <p id="resetStatus" class="form-status"></p>
      </form>

      <div id="verifySent" class="card" style="padding:18px;margin-top:6px;text-align:center;" hidden>
        <div class="verify-icon" aria-hidden="true"></div>
        <h3 style="margin:6px 0;">Check your email</h3>
        <p class="muted" id="verifyMsg" style="font-size:14px;"></p>
        <button id="resendBtn" class="btn btn-ghost btn-sm" type="button">Resend verification email</button>
        <p style="margin-top:12px;"><a href="/account" class="btn btn-primary btn-sm">Continue to my account →</a></p>
      </div>

      <p class="muted" style="font-size:12px;text-align:center;margin-top:10px;"><a href="/">← Back to RAGNAR</a></p>
    </div>
  </main>
  <div id="toast" class="toast"></div>
  <script src="/static/login.js"></script>
  <script src="/static/nav.js"></script>
</body>
</html>
