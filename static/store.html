<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAGNAR — Store</title>
  <link rel="icon" href="/static/logo.svg" />
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    .store-hero { position:relative; height:200px; border-radius:0 0 var(--radius) var(--radius); overflow:hidden; }
    .store-hero-inner { position:absolute; inset:0; display:flex; align-items:flex-end; gap:16px; padding:18px clamp(16px,4vw,40px); background:linear-gradient(180deg, transparent, rgba(8,11,16,.85)); }
    .store-av { width:88px;height:88px;border-radius:20px;border:3px solid var(--bg); display:grid;place-items:center;font-weight:800;font-size:34px;color:#fff; flex:none; }
    .store-h-meta h1 { margin:0; font-size:clamp(24px,4vw,36px); }
    .store-h-meta .tg { color:var(--text-soft); }
    .store-social { display:flex; align-items:center; gap:10px; margin-top:8px; flex-wrap:wrap; }
    .social-meta { font-size:13px; }
    .store-bio { max-width:720px; }
    .store-wrap { padding: 18px clamp(16px,4vw,40px) 60px; }
    .live-strip { display:flex; gap:12px; flex-wrap:wrap; margin:16px 0; }
    .live-pill { display:flex;align-items:center;gap:8px; padding:8px 14px; border-radius:10px; border:1px solid var(--border-strong); background:rgba(200,30,30,.12); cursor:pointer; }
    .live-dot { width:9px;height:9px;border-radius:50%;background:#ff5a5a;box-shadow:0 0 8px #ff5a5a;animation:pulse 1.4s infinite; } @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .bar { display:flex; align-items:center; justify-content:space-between; margin:18px 0 12px; }
    .customize { margin-top:14px; padding:16px; }
    .customize .field-row { grid-template-columns:1fr 1fr; }
    .embed-wrap { aspect-ratio:16/9; border-radius:var(--radius); overflow:hidden; border:1px solid var(--border-strong); margin:12px 0; background:#000; }
    .embed-wrap iframe { width:100%; height:100%; border:0; }
    .designer { margin-bottom:14px; }
    .designer-title { font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--steel); margin-bottom:6px; }
    .design-feed { display:flex; flex-direction:column; gap:6px; margin:8px 0; max-height:180px; overflow:auto; }
    .design-swatch { display:inline-block; width:12px; height:12px; border-radius:3px; vertical-align:middle; margin-right:5px; border:1px solid rgba(255,255,255,.3); }
    .design-row { display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center; }
    .preset-row { display:flex; gap:8px; flex-wrap:wrap; margin:8px 0 4px; }
    .designer-preset-btn { border:1px solid var(--border-strong); background:var(--bg-2); color:var(--text-soft); border-radius:999px; padding:4px 10px; font-size:11px; cursor:pointer; }
    .designer-preset-btn.active { background:rgba(55,189,255,.14); color:var(--text); border-color:var(--ice); }
    .store-listing-link { color: inherit; text-decoration: none; }
    .store-listing-link:hover { text-decoration: underline; }
    .designer-note { font-size:12px; margin:8px 0 0; }
    .nav-space { margin:14px 0; }
    .token-note { margin-top:0; }
    .message-card { margin-top:22px; padding:16px; max-width:640px; }
    .msg-gate { font-size:13px; }
    @media (max-width:760px) {
      .store-wrap { padding: 14px 12px 40px; }
      .bar { flex-direction: column; align-items: flex-start; }
      .customize .field-row { grid-template-columns: 1fr; }
    }
    @media (max-width:640px) {
      .store-hero { height: 230px; }
      .store-hero-inner { flex-direction: column; align-items: flex-start; gap: 10px; padding: 14px 16px; }
      .store-av { width:72px; height:72px; border-radius:16px; font-size:28px; }
      .design-row { grid-template-columns: 1fr; }
      .message-card { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <header id="siteHeader"></header>

  <div class="store-hero" id="storeHero">
    <div class="store-hero-inner">
      <div class="store-av" id="storeAv"></div>
      <div class="store-h-meta">
        <h1 id="storeName">Store</h1>
        <div class="tg" id="storeTag"></div>
        <div class="store-social">
          <button id="followBtn" class="btn btn-sm" type="button">♡ Follow</button>
          <span id="followerCount" class="muted social-meta"></span>
          <span id="storeRating" class="muted social-meta"></span>
          <a href="#message" class="btn btn-ghost btn-sm">✉ Message</a>
        </div>
      </div>
    </div>
  </div>

  <main class="store-wrap">
    <div id="storeBio" class="muted store-bio"></div>
    <div id="liveStrip" class="live-strip" aria-live="polite"></div>

    <div class="bar">
      <span id="listCount" class="result-count">Listings</span>
      <button id="customizeBtn" class="btn btn-ghost btn-sm" type="button">✨ Open store design chat</button>
    </div>

    <div id="customizePanel" class="card customize" hidden>
      <div class="designer">
        <div class="designer-title">✨ Store Designer — describe your vibe</div>
        <div class="preset-row" id="designPresetRow">
          <button class="designer-preset-btn" type="button" data-preset="whatnot">Whatnot-style live seller</button>
          <button class="designer-preset-btn" type="button" data-preset="ebay">eBay-style catalog seller</button>
        </div>
        <div id="designFeed" class="design-feed chat-feed"></div>
        <div class="design-row">
          <input id="designPrompt" placeholder="e.g. dark & premium for vintage Pokémon" />
          <button id="designSend" class="btn btn-primary btn-sm" type="button">Design</button>
        </div>
        <p class="muted designer-note">The designer updates the live preview above. Enter your token below and hit <strong>Save store</strong> to keep it.</p>
      </div>
      <div class="nav-div nav-space"></div>
      <p class="muted token-note">Paste your <strong>store token</strong> (given when you signed up as a seller) to edit your store.</p>
      <label class="field"><span>Store token</span><input id="storeToken" type="password" placeholder="X-Store-Token" /></label>
      <div class="field-row">
        <label class="field"><span>Tagline</span><input id="c-tagline" maxlength="140" /></label>
        <label class="field"><span>Accent color</span><input id="c-accent" type="color" value="#6fd6ff" /></label>
      </div>
      <label class="field"><span>Heading font</span><select id="c-font"><option value="">Default</option></select></label>
      <div class="field-row">
        <label class="field"><span>Banner image URL</span><input id="c-banner" type="url" placeholder="https://…" /></label>
        <label class="field"><span>Avatar image URL</span><input id="c-avatar" type="url" placeholder="https://…" /></label>
      </div>
      <label class="field"><span>Bio</span><textarea id="c-bio" rows="2" maxlength="1000"></textarea></label>
      <button id="saveStoreBtn" class="btn btn-primary btn-sm" type="button">Save store</button>
      <span id="cStatus" class="form-status"></span>
    </div>

    <div id="grid" class="grid" aria-live="polite"></div>

    <div id="message" class="card message-card">
      <div class="designer-title">✉ Message this store</div>
      <div id="msgGate" class="muted msg-gate">Checking sign-in…</div>
      <div id="msgForm" hidden>
        <label class="field"><span>Your message</span><textarea id="msgBody" rows="2" maxlength="2000" placeholder="Ask about a card, shipping, bundles…"></textarea></label>
        <button id="msgSend" class="btn btn-primary btn-sm" type="button">Send message</button>
        <span id="msgStatus" class="form-status"></span>
      </div>
    </div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/static/store.js"></script>
  <script src="/static/nav.js"></script>
  <script src="/static/sell.js"></script>
</body>
</html>
