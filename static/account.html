<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAGNAR — My Account</title>
  <link rel="icon" href="/static/logo.png" />
  <link rel="stylesheet" href="/static/styles.css" />
  <style>.acct { max-width: 560px; margin: 8vh auto; padding: 26px; }</style>
</head>
<body>
  <div class="aurora"></div>
  <header class="site-header">
    <div class="brand"><a href="/" class="logo-link"><img src="/static/logo.png" alt="RAGNAR" class="logo-img" /></a></div>
    <div class="header-actions"><a class="btn btn-ghost btn-sm" href="/">Home</a></div>
  </header>
  <main>
    <div class="card acct">
      <h2 style="margin-top:0;">My Account</h2>
      <div id="acctBody"><p class="muted">Loading…</p></div>
    </div>
  </main>
  <div id="toast" class="toast"></div>
  <script>
    "use strict";
    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    async function api(p, o = {}) { const r = await fetch(p, { ...o, headers: { "Content-Type": "application/json", ...(o.headers || {}) } }); let d = null; try { d = await r.json(); } catch (_) {} if (!r.ok) throw new Error((d && d.detail) || "err"); return d; }
    async function load() {
      const me = await api("/api/auth/me");
      if (!me.user) { location.href = "/login"; return; }
      const u = me.user;
      $("acctBody").innerHTML = `
        <p><strong>${esc(u.name || u.email)}</strong><br><span class="muted">${esc(u.email)}${u.email_verified ? " · verified" : ""}</span></p>
        <p>Role: <span class="badge ${u.is_staff ? "founding" : ""}">${u.is_staff ? "★ Staff (Command Hub)" : "Member"}</span></p>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;">
          ${u.is_staff ? '<a class="btn btn-primary" href="/admin">Open Command Hub →</a>' : ""}
          <a class="btn btn-ghost" href="/stores">Browse stores</a>
          <a class="btn btn-ghost" href="/">Become a seller</a>
          <button id="logoutBtn" class="btn btn-ghost" type="button">Log out</button>
        </div>`;
      $("logoutBtn").addEventListener("click", async () => { await api("/api/auth/logout", { method: "POST" }); location.href = "/"; });
    }
    document.addEventListener("DOMContentLoaded", () => load().catch(() => { location.href = "/login"; }));
  </script>
  <script src="/static/nav.js"></script>
</body>
</html>
