<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAGNAR — Groups</title>
  <link rel="icon" href="/static/logo.png" />
  <link rel="stylesheet" href="/static/tokens.css" />
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/asgard-shell.css" />
  <link rel="stylesheet" href="/static/pages.css" />
  <link rel="stylesheet" href="/static/platform.css" />
</head>
<body class="asgard-realm">
  <header id="siteHeader"></header>

  <main class="platform-main">
    <section class="platform-hero">
      <p class="asgard-kicker"><span class="runes" aria-label="Ragnar in runes">ᚱᚨᚷᚾᚨᚱ</span> Clans</p>
      <h1>Groups</h1>
      <p>Collector clubs, fantasy leagues, show meetups, and seller support — Reddit-style communities inside RAGNAR.</p>
    </section>

    <div class="platform-tabs" id="groupKinds">
      <button class="btn btn-ghost btn-sm active" data-kind="" type="button">Popular</button>
      <button class="btn btn-ghost btn-sm" data-kind="club" type="button">Clubs</button>
      <button class="btn btn-ghost btn-sm" data-kind="fantasy" type="button">Fantasy</button>
      <button class="btn btn-ghost btn-sm" data-kind="meetup" type="button">Meetups</button>
      <button class="btn btn-ghost btn-sm" data-kind="seller_support" type="button">Seller support</button>
      <button class="btn btn-ghost btn-sm" data-kind="new" type="button">New</button>
    </div>

    <div class="section-title section-title-row">
      <span>Browse groups</span>
      <input id="groupSearch" class="store-search" type="search" placeholder="Search groups…" aria-label="Search groups" />
    </div>
    <div id="groupGrid" class="group-grid" aria-live="polite"></div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/static/groups.js"></script>
  <script src="/static/nav.js"></script>
  <script src="/static/sell.js"></script>
</body>
</html>
