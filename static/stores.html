<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAGNAR — Stores & Live</title>
  <link rel="icon" href="/static/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Germania+One&family=IBM+Plex+Mono:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/pages.css" />
</head>
<body class="page-stores">
  <div class="aurora"></div>
  <header id="siteHeader"></header>

  <main class="hub-main">
    <section class="hero-strip">
      <h2>Live sellers & breaks</h2>
      <p>Discover live rooms, seller storefronts, and buy-now inventory in one place.</p>
    </section>

    <div class="section-title" id="liveTitle"><span class="live-dot"></span> Live now</div>
    <div id="liveRow" class="live-row"></div>

    <div class="section-title section-title-row">
      <span>Browse stores</span>
      <input id="storeSearch" class="store-search" type="search" placeholder="Search stores…" aria-label="Search stores" />
    </div>
    <div id="storeGrid" class="store-grid" aria-live="polite"></div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/static/stores.js"></script>
  <script src="/static/nav.js"></script>
  <script src="/static/sell.js"></script>
</body>
</html>
