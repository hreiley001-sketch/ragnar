# RAGNAR + n8n local stack
# Compose tool: https://github.com/docker/compose (plugin: `docker compose`)
#
#   cp .env.example .env   # set DATABASE_URL / secrets
#   docker compose up --build
#
# UI:     http://127.0.0.1:8000   (RAGNAR)
# n8n:    http://127.0.0.1:5678
# Hook:   http://n8n:5678/webhook/ragnar-events  (from ragnar service)

services:
  ragnar:
    build: .
    ports:
      - "${RAGNAR_PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      PORT: "8000"
      # Reach n8n on the compose network (override in .env if needed)
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://n8n:5678/webhook/ragnar-events}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://127.0.0.1:8000}
      SITE_URL: ${SITE_URL:-http://127.0.0.1:8000}
      UPLOAD_DIR: /data/uploads
      # Prefer Alembic when DATABASE_URL is Postgres/Supabase
      SCHEMA_BOOTSTRAP: ${SCHEMA_BOOTSTRAP:-alembic}
    volumes:
      - ragnar-uploads:/data/uploads
    depends_on:
      n8n:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://127.0.0.1:5678}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_PUBLIC_URL:-http://127.0.0.1:5678/}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-ragnar-local-n8n-dev-key-change-me}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-UTC}
    volumes:
      - n8n-data:/home/node/.n8n
      - ./integrations/n8n/ragnar-events.json:/import/ragnar-events.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  ragnar-uploads:
  n8n-data:
