# Render blueprint for RAGNAR — https://render.com
# Deploy: push this repo to GitHub, then in Render: New → Blueprint → pick the repo.
# A 1GB persistent disk keeps the SQLite DB and uploaded scan photos across deploys.
# For Supabase: override DATABASE_URL in the Render dashboard, set
# SCHEMA_BOOTSTRAP=alembic, and change startCommand to:
#   alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
services:
  - type: web
    name: ragnar
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    # create_all stays enabled for the SQLite disk (see SCHEMA_BOOTSTRAP).
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: ragnar-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: ENVIRONMENT
        value: production
      # Keep create_all for SQLite persistent disk until Postgres + Alembic cutover.
      - key: SCHEMA_BOOTSTRAP
        value: create_all
      - key: SEED_DEMO
        value: "false"
      # Override in the dashboard with your Supabase URI to cut over.
      - key: DATABASE_URL
        value: sqlite:////var/data/ragnar.db
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: ALLOWED_ORIGINS
        value: https://ragnarips.com,https://www.ragnarips.com
      - key: PUBLIC_BASE_URL
        value: https://ragnarips.com
      - key: SITE_URL
        value: https://ragnarips.com
      - key: PAYMENTS_LIVE
        value: "false"
      # Secrets — set in the Render dashboard (Environment → Edit):
      # Stripe Dashboard → Developers → API keys (use TEST keys first):
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      # Stripe Dashboard → Developers → Webhooks → Add endpoint
      #   URL: https://ragnarips.com/api/payments/webhook
      #   Events: checkout.session.completed, checkout.session.expired
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: TCG_API_KEY
        sync: false
      - key: XIMILAR_TOKEN
        sync: false
      - key: COMPS_PROVIDER_URL
        sync: false
      - key: COMPS_PROVIDER_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: REMOVEBG_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: GOOGLE_FONTS_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      # Scale (see docs/ARCHITECTURE.md): Redis + Supabase JWT for multi-node.
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: DATABASE_READ_URL
        sync: false
      - key: N8N_WEBHOOK_URL
        sync: false
      - key: N8N_WEBHOOK_SECRET
        sync: false
