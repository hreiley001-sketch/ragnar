# Render blueprint for RAGNAR — https://render.com
# Deploy: push this repo to GitHub, then in Render: New → Blueprint → pick the repo.
# Disk keeps uploads (+ SQLite until Supabase cutover). See DEPLOY.md § Supabase.
services:
  - type: web
    name: ragnar
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    # After Supabase cutover: run `alembic upgrade head` then set SCHEMA_BOOTSTRAP=alembic.
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: ragnar-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: ENVIRONMENT
        value: production
      # Keep create_all for SQLite disk until Postgres + Alembic cutover.
      - key: SCHEMA_BOOTSTRAP
        value: create_all
      - key: SEED_DEMO
        value: "false"
      # Fallback while USE_SUPABASE_DB is false. After cutover, leave as-is or remove.
      - key: DATABASE_URL
        value: sqlite:////var/data/ragnar.db
      # Opt-in Supabase cutover (set true only after alembic + backfill):
      - key: USE_SUPABASE_DB
        value: "false"
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_JWKS_URL
        sync: false
      - key: N8N_WEBHOOK_BASE
        sync: false
      - key: N8N_WEBHOOK_SECRET
        sync: false
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: ALLOWED_ORIGINS
        value: https://ragnarips.com,https://www.ragnarips.com
      - key: PUBLIC_BASE_URL
        value: https://ragnarips.com
      - key: SITE_URL
        value: https://ragnarips.com
      - key: PAYMENTS_LIVE
        value: "false"
      # Secrets — set in the Render dashboard (Environment → Edit):
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TCG_API_KEY
        sync: false
      - key: XIMILAR_TOKEN
        sync: false
      - key: COMPS_PROVIDER_URL
        sync: false
      - key: COMPS_PROVIDER_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: REMOVEBG_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: GOOGLE_FONTS_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: POSTHOG_API_KEY
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
